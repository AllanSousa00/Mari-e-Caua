<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caça ao Contexto | Configurações</title>
    <meta
        name="description"
        content="Página de configurações do jogo Caça ao Contexto."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="css/style.css?v=12">
</head>
<body class="page page--settings" data-page="settings" data-skin="coral">
    <main class="shell shell--settings">
        <header class="topbar topbar--simple">
            <a class="button button--ghost" href="index.html">Menu</a>
            <div class="topbar-copy">
                <p class="eyebrow">Configurações</p>
                <h1>Organize seu jeito de jogar</h1>
            </div>
            <a class="button button--ghost" href="jogo.html">Jogo</a>
        </header>

        <section class="panel-card settings-card">
            <div class="settings-presets">
                <button class="preset-button" type="button" data-preset="focus">Foco ENEM</button>
                <button class="preset-button" type="button" data-preset="speed">Ritmo Rápido</button>
                <button class="preset-button" type="button" data-preset="calm">Estudo Leve</button>
            </div>

            <div class="settings-grid">
                <label class="field">
                    <span>Visual</span>
                    <select id="skin-select">
                        <option value="coral">Coral</option>
                        <option value="oceano">Oceano</option>
                        <option value="jade">Jade</option>
                    </select>
                </label>
                <label class="field">
                    <span>Dificuldade</span>
                    <select id="difficulty-select">
                        <option value="easy">Fácil</option>
                        <option value="medium">Médio</option>
                        <option value="hard">Difícil</option>
                        <option value="expert">Expert</option>
                    </select>
                </label>
                <label class="field">
                    <span>Modo</span>
                    <select id="mode-select">
                        <option value="classic">Clássico</option>
                        <option value="timed">Contra o tempo</option>
                        <option value="relax">Relaxante</option>
                        <option value="progressive">Progressivo</option>
                        <option value="surprise">Tema surpresa</option>
                    </select>
                </label>
                <label class="field">
                    <span>Grade</span>
                    <select id="grid-size-select">
                        <option value="10">10x10</option>
                        <option value="12">12x12</option>
                        <option value="15">15x15</option>
                        <option value="18">18x18</option>
                    </select>
                </label>
                <label class="field">
                    <span>Som</span>
                    <select id="sound-select">
                        <option value="on">Ligado</option>
                        <option value="off">Desligado</option>
                    </select>
                </label>
                <label class="field">
                    <span>Pistas</span>
                    <select id="assist-select">
                        <option value="smart">Ligadas</option>
                        <option value="off">Desligadas</option>
                    </select>
                </label>
            </div>

            <div id="settings-preview" class="status-card"></div>
            <p id="settings-message" class="settings-message" aria-live="polite"></p>

            <div class="menu-actions">
                <button id="save-settings-btn" class="button button--primary" type="button">Salvar</button>
                <button id="reset-settings-btn" class="button button--ghost" type="button">Restaurar padrão</button>
            </div>
        </section>
    </main>

    <script src="js/app-data.js?v=12"></script>
    <script src="js/settings.js?v=12"></script>
</body>
</html>
