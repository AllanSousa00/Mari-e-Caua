<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caça ao Contexto | Menu</title>
    <meta
        name="description"
        content="Menu principal do jogo Caça ao Contexto."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="css/style.css?v=12">
</head>
<body class="page page--menu" data-page="menu" data-skin="coral">
    <main class="shell shell--menu">
        <section class="hero-card hero-card--menu">
            <p class="eyebrow">Menu principal</p>
            <h1>Caça ao Contexto</h1>
            <p class="hero-copy">
                Escolha a matéria, entre no jogo e destrave fatos reais enquanto joga.
            </p>
            <div class="menu-actions">
                <a class="button button--ghost" href="configuracoes.html">Configurações</a>
                <button id="start-game-btn" class="button button--primary" type="button">Jogar</button>
            </div>
            <div id="menu-summary" class="status-card"></div>
        </section>

        <section class="panel-card panel-card--subjects panel-card--menu">
            <section class="menu-section">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">Escolher matéria</p>
                        <h2>Selecione sua área</h2>
                    </div>
                </div>
                <div id="subject-grid" class="subject-grid"></div>
            </section>

            <section class="menu-section menu-theme-panel">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">Temas</p>
                        <h2>Dossiê da rodada</h2>
                    </div>
                </div>
                <div id="menu-theme-list" class="theme-list"></div>
                <div id="menu-theme-summary" class="status-card"></div>
            </section>
        </section>
    </main>

    <script src="js/app-data.js?v=12"></script>
    <script src="js/menu.js?v=12"></script>
</body>
</html>
